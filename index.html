<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<title>Villa Gourmet • Painel Operacional</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2b1b12">

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* ================================
RESET
================================ */

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:Inter,sans-serif;
background:#1b120c;
color:#fff;
}

/* ================================
HEADER
================================ */

.header{
background:linear-gradient(180deg,#2b1b12,#1b120c);
padding:22px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.08);
}

.header h1{
margin:0;
font-family:'Playfair Display',serif;
font-size:26px;
letter-spacing:1px;
}

.header span{
font-size:13px;
opacity:.7;
}

/* ================================
BANNER
================================ */

.banner{
background:#c98a4c;
color:#1b120c;
margin:16px;
padding:12px;
border-radius:10px;
text-align:center;
font-weight:700;
}

/* ================================
GRID
================================ */

.container{
padding:16px;
display:grid;
grid-template-columns:1fr;
gap:16px;
}

/* ================================
CARD
================================ */

.card{
background:#2b1b12;
border-radius:16px;
padding:18px;
box-shadow:0 6px 20px rgba(0,0,0,.35);
border:1px solid rgba(255,255,255,.06);
}

.card h3{
margin:0 0 14px 0;
font-size:18px;
font-weight:800;
}

/* ================================
BOTÕES
================================ */

.btn{
display:block;
width:100%;
padding:14px;
margin-bottom:10px;

border:none;
border-radius:10px;

font-weight:700;
font-size:15px;

background:#c98a4c;
color:#1b120c;

cursor:pointer;
}

.btn:last-child{
margin-bottom:0;
}

.btn:active{
transform:scale(.97);
}

/* ================================
RESPONSIVO
================================ */

@media(min-width:700px){

.container{
grid-template-columns:repeat(2,1fr);
}

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">
<h1>Villa Gourmet • Churrascada</h1>
<span>Painel Operacional</span>
</div>

<!-- AVISO -->


<!-- CARDS -->

<div class="container">

<div class="card">
  <h3>BUFFET</h3>

<button class="btn"
onclick="location.href='analisebuffet.html'">
Análise do buffet
</button>

<button class="btn"
onclick="location.href='lançamentos.html'">
Lançamentos do buffet (dia vigente)
</button>


</div>

<div class="card">
<h3>RESERVAS</h3>

<button class="btn"
onclick="location.href='reservas.html'">
Reservas
</button>

</div>

<div class="card">
<h3>REQUISIÇÕES ENVIADAS</h3>

<button class="btn"
onclick="location.href='requiscoes.html'">
Requisições
</button>

</div>

</div>

<script>

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js")
}

</script>

<script>

if ("serviceWorker" in navigator) {

window.addEventListener("load", () => {

navigator.serviceWorker
.register("./sw.js")
.then(reg => console.log("SW registrado"))
.catch(err => console.log("Erro SW", err));

});

}

</script>
</body>
</html>
