<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<title>Agenda de Músicos</title>

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>

/* ================= BASE ================= */

:root{
--gold:#ffd700;
--bg:#0b0b15;
--card:#171725;
--border:rgba(255,255,255,.08);
--text:#fff;
--muted:#9ca3af;
--radius:14px;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Poppins;
background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

/* ================= HEADER ================= */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 16px;
background:#111324;
border-bottom:1px solid var(--border);
}

.title{
font-size:20px;
font-weight:600;
color:var(--gold);
}

.subtitle{
font-size:12px;
color:#aaa;
}

/* ================= CONTENT ================= */

.content{
flex:1;
overflow-y:auto;
padding:16px;
}

.lista{
max-width:900px;
margin:auto;
display:flex;
flex-direction:column;
gap:18px;
}

/* ================= DIA ================= */

.grupo{
display:grid;
grid-template-columns:60px 1fr;
gap:12px;
}

.dia{
font-size:26px;
font-weight:600;
text-align:center;
}

.dia small{
display:block;
font-size:11px;
color:var(--gold);
}

/* ================= EVENTO ================= */

.itens{
display:flex;
flex-direction:column;
gap:10px;
border-left:2px solid var(--gold);
padding-left:10px;
}

.linha{
display:flex;
align-items:center;
justify-content:space-between;
background:var(--card);
border:1px solid var(--border);
padding:10px;
border-radius:12px;
cursor:pointer;
}

.evento{
display:flex;
align-items:center;
gap:10px;
}

.foto{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
border:2px solid var(--gold);
}

.texto{
font-size:14px;
font-weight:600;
}

.estilo{
font-size:11px;
color:var(--gold);
}

.hora{
font-size:13px;
color:var(--muted);
}

/* ================= BOTÃO + ================= */

#addBtn{
position:fixed;
bottom:22px;
right:22px;
width:58px;
height:58px;
border-radius:50%;
background:var(--gold);
border:none;
font-size:30px;
}

/* ================= MODAL ================= */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:flex-end;
justify-content:center;
}

.modal-box{

background:#111324;

width:100%;
max-width:500px;

border-radius:20px 20px 0 0;

padding:20px;

max-height:85vh;

overflow-y:auto;

}

/* ================= FORM GRID ================= */

.form-grid{
display:grid;
grid-template-columns:1fr 100px;
gap:10px;
}

.form-row{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.form-full{
margin-top:10px;
}

label{
font-size:11px;
color:#bbb;
}

input{
width:100%;
padding:14px;
font-size:17px;
border-radius:10px;
border:1px solid #333;
background:#1a1c2e;
color:white;
margin-top:4px;
}

/* foto preview */

#preview{
width:70px;
height:70px;
border-radius:50%;
object-fit:cover;
border:2px solid var(--gold);
}

/* ================= BOTÕES ================= */

.actions{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-top:16px;
}

.btn{
padding:14px;
border:none;
border-radius:12px;
font-size:14px;
font-weight:600;
}

.salvar{background:var(--gold)}
.delete{background:#e11d48;color:white}
.cancel{background:#333;color:white}

</style>

</head>

<body>

<header>

<div>

<div class="title">Agenda</div>

<div class="subtitle" id="empresaNome"></div>

</div>

<button id="calendarBtn">📅</button>

</header>

<div class="content">

<div class="lista" id="lista"></div>

</div>

<button id="addBtn">+</button>

<!-- FORM -->

<div class="modal" id="formModal">

<div class="modal-box">

<h3 id="formTitle">Músico</h3>

<!-- cantor + foto -->

<div class="form-grid">

<div>

<label>Cantor</label>
<input type="text" id="f_cantor">

</div>

<div>

<label>Foto</label>
<input type="file" id="f_foto">

<img id="preview">

</div>

</div>

<!-- data hora -->

<div class="form-row">

<div>

<label>Data</label>
<input type="date" id="f_data">

</div>

<div>

<label>Hora</label>
<input type="time" id="f_hora">

</div>

</div>

<!-- estilo -->

<div class="form-full">

<label>Estilo musical</label>
<input type="text" id="f_estilo">

</div>

<!-- valor -->

<div class="form-full">

<label>Valor</label>
<input type="number" id="f_valor">

</div>

<!-- botoes -->

<div class="actions">

<button class="btn salvar" onclick="salvarRegistro()">Salvar</button>

<button class="btn delete" onclick="deleteRegistro()">Excluir</button>

<button class="btn cancel" onclick="fecharForm()">Cancelar</button>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>

/* SUPABASE */

const sb = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let EDITANDO=null

/* PREVIEW FOTO */

f_foto.onchange=e=>{

preview.src=URL.createObjectURL(e.target.files[0])

}

/* UPLOAD */

async function uploadFoto(file){

const nome=Date.now()+"_"+file.name

await sb.storage
.from("agenda-musicos")
.upload(nome,file)

const {data}=sb.storage
.from("agenda-musicos")
.getPublicUrl(nome)

return data.publicUrl

}

/* EDITAR */

async function editar(id){

const {data}=await sb
.from("agenda_musicos")
.select("*")
.eq("id",id)
.single()

EDITANDO=data

formModal.style.display="flex"

f_cantor.value=data.cantor
f_estilo.value=data.estilo
f_data.value=data.data
f_hora.value=data.hora
f_valor.value=data.valor

preview.src=data.foto||''

}

/* SALVAR */

async function salvarRegistro(){

let fotoURL=EDITANDO?.foto||null

const file=f_foto.files[0]

if(file){

fotoURL=await uploadFoto(file)

}

const dados={

cantor:f_cantor.value,
estilo:f_estilo.value,
data:f_data.value,
hora:f_hora.value,
valor:f_valor.value,
foto:fotoURL

}

if(EDITANDO){

await sb
.from("agenda_musicos")
.update(dados)
.eq("id",EDITANDO.id)

}else{

await sb
.from("agenda_musicos")
.insert([dados])

}

fecharForm()

}

/* DELETE */

async function deleteRegistro(){

if(!EDITANDO)return

await sb
.from("agenda_musicos")
.delete()
.eq("id",EDITANDO.id)

fecharForm()

}

/* FORM */

addBtn.onclick=()=>{

EDITANDO=null

formModal.style.display="flex"

}

function fecharForm(){

formModal.style.display="none"

}

</script>

</body>
</html>
