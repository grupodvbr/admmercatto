<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Agenda de Músicos</title>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Great+Vibes&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>

/* ============================= */
/* VARIÁVEIS */
/* ============================= */

:root{
--gold:#ffd700;
--bg:#0b0b15;
--card:#171725;
--border:rgba(255,255,255,.08);
--text:#ffffff;
--muted:#9ca3af;
--radius:14px;
}

/* ============================= */

*{box-sizing:border-box;margin:0;padding:0}

body{

font-family:'Poppins',sans-serif;
background:linear-gradient(180deg,#050507,#0c0c18);
color:var(--text);

height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;

}

/* ============================= */
/* HEADER */
/* ============================= */

header{

display:flex;
justify-content:space-between;
align-items:center;

padding:14px 16px;

background:rgba(10,10,20,.9);
border-bottom:1px solid var(--border);

}

.title{
font-family:'Bebas Neue';
font-size:30px;
color:var(--gold);
}

.subtitle{
font-family:'Great Vibes';
font-size:18px;
}

.head-right{
display:flex;
gap:8px;
align-items:center;
}

.btn{
background:var(--gold);
border:none;
padding:8px 12px;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

/* ============================= */
/* CONTEUDO */
/* ============================= */

.content{

flex:1;
overflow-y:auto;

padding:16px;

display:flex;
justify-content:center;

}

.lista{

width:100%;
max-width:850px;

display:flex;
flex-direction:column;
gap:18px;

}

/* ============================= */
/* GRUPO DIA */
/* ============================= */

.grupo{

display:grid;
grid-template-columns:60px 1fr;
gap:14px;

}

.dia{

font-family:'Bebas Neue';
font-size:28px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

}

.dia small{
font-size:11px;
color:var(--gold);
}

/* ============================= */
/* EVENTOS */
/* ============================= */

.itens{
display:flex;
flex-direction:column;
gap:10px;
border-left:2px solid var(--gold);
padding-left:12px;
}

.linha{

display:flex;
align-items:center;
justify-content:space-between;

background:var(--card);
border:1px solid var(--border);

padding:10px;
border-radius:12px;

cursor:pointer;

}

.evento{
display:flex;
align-items:center;
gap:10px;
}

.foto{

width:44px;
height:44px;

border-radius:50%;
object-fit:cover;

border:2px solid var(--gold);

}

.texto{
font-weight:600;
}

.estilo{
font-size:12px;
color:var(--gold);
}

.hora{
font-size:13px;
color:var(--muted);
}

/* ============================= */
/* BOTÃO + */
/* ============================= */

#addBtn{

position:fixed;
bottom:20px;
right:20px;

width:56px;
height:56px;

border-radius:50%;
border:none;

background:var(--gold);

font-size:30px;
font-weight:900;

cursor:pointer;

}

/* ============================= */
/* MODAL */
/* ============================= */

.modal{

position:fixed;
inset:0;

display:none;

align-items:center;
justify-content:center;

background:rgba(0,0,0,.7);

}

.modal-box{

background:#111324;

padding:20px;

border-radius:14px;

width:min(90vw,420px);

}

.modal-box h3{
margin-bottom:10px;
}

.modal-box label{
display:block;
margin-top:8px;
}

.modal-box input{

width:100%;
padding:8px;

margin-top:4px;

border-radius:6px;
border:1px solid #ccc;

}

.modal-box button{
margin-top:10px;
width:100%;
}

/* ============================= */
/* LOGIN */
/* ============================= */

#loginBox{

background:white;
color:black;

padding:20px;

border-radius:14px;

display:flex;
flex-direction:column;
gap:10px;

width:300px;

}

/* ============================= */

</style>

</head>

<body>

<header>

<div>

<div class="title">Agenda</div>
<div class="subtitle" id="empresaNome"></div>

</div>

<div class="head-right">

<button id="calendarBtn" class="btn">📅</button>

</div>

</header>

<div class="content">

<div class="lista" id="lista"></div>

</div>

<button id="addBtn">+</button>

<!-- LOGIN -->

<div class="modal" id="loginModal">

<div id="loginBox">

<h3>Login</h3>

<input type="password" id="senha" placeholder="Senha">

<button onclick="login()" class="btn">Entrar</button>

<div id="loginMsg"></div>

</div>

</div>

<!-- FORM -->

<div class="modal" id="formModal">

<div class="modal-box">

<h3 id="formTitle">Novo</h3>

<label>Data</label>
<input type="date" id="f_data">

<label>Cantor</label>
<input type="text" id="f_cantor">

<label>Estilo</label>
<input type="text" id="f_estilo">

<label>Horário</label>
<input type="time" id="f_hora">

<label>Valor</label>
<input type="text" id="f_valor">

<label>Foto</label>
<input type="file" id="f_foto">

<button onclick="salvarRegistro()" class="btn">Salvar</button>

<button onclick="deleteRegistro()" id="deleteBtn" style="display:none;background:red;color:white">Excluir</button>

<button onclick="fecharForm()">Cancelar</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* SUPABASE */

const sb = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

/* EMPRESAS */

const SENHAS={
"0152":"Mercatto Delícia",
"1058":"Villa Gourmet",
"8486":"Delícia Gourmet"
}

let EMPRESA=null
let EDITANDO=null

/* LOGIN */

function verificarLogin(){

const e=localStorage.getItem("empresa")

if(e){

EMPRESA=e
document.getElementById("empresaNome").textContent=e
document.getElementById("loginModal").style.display="none"
carregarAgenda()

}else{

document.getElementById("loginModal").style.display="flex"

}

}

function login(){

const senha=document.getElementById("senha").value

if(SENHAS[senha]){

EMPRESA=SENHAS[senha]

localStorage.setItem("empresa",EMPRESA)

document.getElementById("empresaNome").textContent=EMPRESA

document.getElementById("loginModal").style.display="none"

carregarAgenda()

}else{

document.getElementById("loginMsg").textContent="Senha incorreta"

}

}

/* CARREGAR */

async function carregarAgenda(){

const box=document.getElementById("lista")

box.innerHTML=""

let {data}=await sb
.from("agenda_musicos")
.select("*")
.eq("empresa",EMPRESA)
.order("data")

const grupos={}

data.forEach(ev=>{

if(!grupos[ev.data])grupos[ev.data]=[]

grupos[ev.data].push(ev)

})

Object.keys(grupos).forEach(d=>{

const itens=grupos[d].map(ev=>`

<div class="linha">

<div class="evento">

<img class="foto" src="${ev.foto||'https://i.imgur.com/0y0y0y0.png'}">

<div>

<div class="texto">${ev.cantor}</div>
<div class="estilo">${ev.estilo||""}</div>

</div>

</div>

<div class="hora">${ev.hora}</div>

</div>

`).join("")

box.innerHTML+=`

<div class="grupo">

<div class="dia">

${new Date(d).getDate()}
<small>${new Date(d).toLocaleString('pt-BR',{month:'short'})}</small>

</div>

<div class="itens">${itens}</div>

</div>

`

})

}

/* UPLOAD FOTO */

async function uploadFoto(file){

const nome=Date.now()+"_"+file.name

await sb.storage
.from("agenda-musicos")
.upload(nome,file)

const {data}=sb.storage
.from("agenda-musicos")
.getPublicUrl(nome)

return data.publicUrl

}

/* SALVAR */

async function salvarRegistro(){

let fotoURL=null

const file=document.getElementById("f_foto").files[0]

if(file){

fotoURL=await uploadFoto(file)

}

await sb
.from("agenda_musicos")
.insert([{

empresa:EMPRESA,

data:document.getElementById("f_data").value,

cantor:document.getElementById("f_cantor").value,

estilo:document.getElementById("f_estilo").value,

hora:document.getElementById("f_hora").value,

valor:document.getElementById("f_valor").value,

foto:fotoURL

}])

fecharForm()

carregarAgenda()

}

/* FORM */

document.getElementById("addBtn").onclick=()=>{

document.getElementById("formModal").style.display="flex"

}

/* FECHAR */

function fecharForm(){

document.getElementById("formModal").style.display="none"

}

verificarLogin()

</script>

</body>
</html>
